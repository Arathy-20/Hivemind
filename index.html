<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Hivemind</title>
</head>
<body>
<script>
  // If user chose "Keep me signed in" and is remembered, go straight to homepage
  // Otherwise go to login
  try {
    const remembered = localStorage.getItem('hm_user');
    const rememberFlag = localStorage.getItem('hm_remember');
    if (remembered && rememberFlag) {
      window.location.replace('hivemind_upgraded.html?user=' + encodeURIComponent(remembered));
    } else {
      window.location.replace('hivemind_login.html');
    }
  } catch(e) {
    window.location.replace('hivemind_login.html');
  }
</script>
</body>
</html>
